<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
<title>🦕 恐龙快跑</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:#f9f9f6;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;
  font-family:'Caveat',cursive,'PingFang SC',sans-serif;
  overflow:hidden;touch-action:none;user-select:none;
}
h1{font-size:24px;color:#222;margin-bottom:4px;letter-spacing:1px}
#sb{font-size:17px;color:#333;margin-bottom:8px}
canvas{
  border:2.5px solid #333;border-radius:4px;
  background:#fff;display:block;max-width:96vw;
}
#msg{margin-top:10px;font-size:20px;color:#444;min-height:26px;text-align:center}
#controls{display:flex;gap:24px;margin-top:14px}
.cbtn{
  width:76px;height:76px;border-radius:50%;
  border:2.5px solid #333;background:#fff;
  font-size:15px;font-family:'Caveat',cursive;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:2px;
  box-shadow:3px 3px 0 #bbb;
  line-height:1.2;
}
.cbtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #bbb}
#hint{margin-top:8px;font-size:13px;color:#aaa}

/* 难度指示器 */
#difficulty-bar{
  display:flex;align-items:center;gap:8px;margin-bottom:6px;
  font-size:14px;color:#555;
}
#diff-label{font-weight:700;min-width:52px;}
#diff-track{
  width:120px;height:10px;background:#eee;border-radius:5px;
  border:1.5px solid #ccc;overflow:hidden;
}
#diff-fill{
  height:100%;border-radius:5px;
  background:linear-gradient(90deg,#4caf50,#ff9800,#f44336);
  transition:width .4s ease;
}
#diff-level{font-size:13px;color:#888;}



/* 死亡弹窗 */
#death-modal{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.55);
  display:none;align-items:center;justify-content:center;z-index:150;
}
#death-panel{
  background:#fff;border:3px solid #222;border-radius:16px;
  box-shadow:6px 6px 0 #999;padding:28px 36px;text-align:center;
  min-width:270px;max-width:88vw;
  animation:popIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
#death-emoji{font-size:54px;line-height:1;margin-bottom:6px;}
#death-title{font-size:36px;font-weight:700;color:#111;margin-bottom:4px;letter-spacing:1px;}
#death-sub{font-size:17px;color:#666;margin-bottom:20px;}
#death-btn-row{display:flex;gap:14px;justify-content:center;margin-bottom:14px;}
.death-btn{
  padding:12px 26px;font-size:19px;font-family:'Caveat',cursive;font-weight:700;
  border:2.5px solid #222;border-radius:10px;background:#fff;
  box-shadow:3px 3px 0 #aaa;cursor:pointer;color:#222;
  transition:transform .08s;
}
.death-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #aaa}
.kiss-yes{background:#fff0f5;border-color:#e91e8c;color:#c2185b;box-shadow:3px 3px 0 #f8bbd0;}
.kiss-yes:active{box-shadow:1px 1px 0 #f8bbd0;}
.kiss-no{background:#f5f5f5;color:#555;}
#death-score-row{font-size:15px;color:#aaa;}
#death-score-num{font-weight:700;color:#888;}



/* 角色选择界面 */
#char-select{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(249,249,246,0.98);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:300;font-family:'Caveat',cursive,'PingFang SC',sans-serif;
}
#char-select h2{font-size:28px;font-weight:700;color:#222;margin-bottom:6px;letter-spacing:1px;}
#char-select p{font-size:16px;color:#888;margin-bottom:28px;}
.char-card{
  cursor:pointer;border:3px solid #ddd;border-radius:18px;
  padding:18px 24px;background:#fff;box-shadow:4px 4px 0 #ddd;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  transition:border-color .15s, box-shadow .15s, transform .1s;
  min-width:160px;
}
.char-card:hover{border-color:#e91e8c;box-shadow:4px 4px 0 #f8bbd0;transform:translateY(-2px);}
.char-card.selected{border-color:#e91e8c;box-shadow:4px 4px 0 #f48fb1;background:#fff0f5;}
.char-card img{width:96px;height:96px;border-radius:50%;object-fit:cover;border:3px solid #eee;}
.char-card span{font-size:17px;font-weight:700;color:#333;}
#char-start-btn{
  margin-top:24px;padding:12px 44px;
  font-size:20px;font-family:'Caveat',cursive;font-weight:700;
  border:2.5px solid #333;border-radius:10px;background:#fff;
  box-shadow:3px 3px 0 #bbb;cursor:pointer;color:#222;
  opacity:.45;pointer-events:none;transition:opacity .2s;
}
#char-start-btn.ready{opacity:1;pointer-events:auto;}
#char-start-btn.ready:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #bbb;}
#char-hint-txt{margin-top:10px;font-size:13px;color:#bbb;}
</style>
</head>
<body>
<h1>🦕 恐龙快跑</h1>
<div id="sb">得分：<span id="sc">0</span> &nbsp;｜&nbsp; 最高：<span id="bst">0</span></div>
<div id="difficulty-bar">
  <span id="diff-label">新手</span>
  <div id="diff-track"><div id="diff-fill" style="width:0%"></div></div>
  <span id="diff-level">Lv.1</span>
</div>
<canvas id="c" width="440" height="210"></canvas>
<div id="msg">点击画面或按空格开始</div>
<div id="controls">
  <button class="cbtn" id="bj" ontouchstart="onJump(event)">
    <span style="font-size:22px">↑</span><span>跳跃</span>
  </button>
  <button class="cbtn" id="bd" ontouchstart="onDuckStart(event)" ontouchend="onDuckEnd(event)">
    <span style="font-size:22px">↓</span><span>蹲下</span>
  </button>
</div>
<div id="hint">电脑：空格/↑ 跳跃，↓ 蹲下</div>

<!-- 角色选择界面 -->
<div id="char-select">
  <h2>🦕 恐龙快跑</h2>
  <p>选择你的角色</p>
  <div class="char-card" id="the-char-card" onclick="selectChar()">
    <img id="char-preview" src="" alt="角色">
    <span>超可爱的我 😘</span>
  </div>
  <button id="char-start-btn" onclick="confirmChar()">开始游戏 ▶</button>
  <div id="char-hint-txt">点击角色选择，然后开始！</div>
</div>

<!-- 死亡弹窗 -->
<div id="death-modal">
  <div id="death-panel">
    <div id="death-emoji">💀</div>
    <div id="death-title">你已死亡</div>
    <div id="death-sub">给作者一个亲亲即可复活</div>
    <div id="death-btn-row">
      <button class="death-btn kiss-yes" onclick="kissRevive()">😘 亲亲</button>
      <button id="no-kiss-btn" class="death-btn kiss-no" onclick="kissRefuse()">🙅 不亲亲</button>
    </div>
    <div id="death-score-row">得分 <span id="death-score-num">0</span></div>
  </div>
</div>

];

function getDiffLevel(score) {
  let lv = 0;
  for(let i=0;i<DIFF_LEVELS.length;i++){
    if(score >= DIFF_LEVELS[i].score) lv = i;
  }
  return lv;
}

// ─── 难度 UI 更新 ─────────────────────────────────
function updateDiffUI(lv){
  const d = DIFF_LEVELS[lv];
  const nxt = DIFF_LEVELS[lv+1];
  document.getElementById('diff-label').textContent = d.name;
  document.getElementById('diff-label').style.color = d.color;
  document.getElementById('diff-level').textContent = 'Lv.'+(lv+1);
  let pct = 0;
  if(nxt){
    const range = nxt.score - d.score;
    const cur = Math.floor(sc/10) - d.score;
    pct = Math.min(100, Math.max(0, (cur/range)*100));
  } else { pct = 100; }
  document.getElementById('diff-fill').style.width = pct+'%';
}

// ─── 绘图工具 ────────────────────────────────────
function jit(){return(Math.random()-.5)*1.4;}
function sLine(x1,y1,x2,y2,lw){
  ctx.save();ctx.strokeStyle='#222';ctx.lineWidth=lw||1.7;
  ctx.beginPath();ctx.moveTo(x1+jit(),y1+jit());ctx.lineTo(x2+jit(),y2+jit());
  ctx.stroke();ctx.restore();
}
function sRect(x,y,w,h,lw){
  ctx.save();ctx.strokeStyle='#222';ctx.lineWidth=lw||1.7;
  ctx.beginPath();
  ctx.moveTo(x+jit(),y+jit());ctx.lineTo(x+w+jit(),y+jit());
  ctx.lineTo(x+w+jit(),y+h+jit());ctx.lineTo(x+jit(),y+h+jit());
  ctx.closePath();ctx.stroke();ctx.restore();
}

// ─── 云、地面 ────────────────────────────────────
function drawCloud(x,y,s){
  ctx.save();ctx.strokeStyle='#444';ctx.fillStyle='#fff';ctx.lineWidth=1.4;
  ctx.beginPath();
  ctx.arc(x,y,14*s,Math.PI,0);
  ctx.arc(x+17*s,y-5*s,10*s,Math.PI,0);
  ctx.arc(x+30*s,y,12*s,Math.PI,0);
  ctx.lineTo(x+42*s,y);ctx.lineTo(x-14*s,y);
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.restore();
}
function drawGround(){
  sLine(0,GY+6,W,GY+6,2.2);
  ctx.fillStyle='#666';
  pebbles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,GY+15,p.r,0,Math.PI*2);ctx.fill();});
}

// ─── 障碍物（地面仙人掌 + 空中飞石）────────────────
function drawObs(o){
  if(o.air){
    // 飞石：漂浮的方块
    ctx.save();
    ctx.fillStyle='#f5f5f5';
    ctx.fillRect(o.x,o.y,o.w,o.h);
    ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.lineCap='round';
    ctx.strokeRect(o.x,o.y,o.w,o.h);
    // 纹理线
    ctx.lineWidth=1;ctx.strokeStyle='#bbb';
    ctx.beginPath();ctx.moveTo(o.x+o.w*.35,o.y);ctx.lineTo(o.x+o.w*.35,o.y+o.h);ctx.stroke();
    ctx.beginPath();ctx.moveTo(o.x,o.y+o.h*.4);ctx.lineTo(o.x+o.w,o.y+o.h*.4);ctx.stroke();
    ctx.restore();
  } else {
    // 仙人掌
    ctx.save();ctx.strokeStyle='#222';ctx.lineWidth=2;ctx.lineCap='round';
    const mx=o.x+o.w/2;
    ctx.beginPath();ctx.moveTo(mx-4,o.y+o.h);ctx.lineTo(mx-4,o.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mx+4,o.y+o.h);ctx.lineTo(mx+4,o.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mx-4,o.y);ctx.lineTo(mx+4,o.y);ctx.stroke();
    const la=o.y+o.h*.38;
    ctx.beginPath();ctx.moveTo(mx-4,la);ctx.lineTo(o.x+2,la);ctx.stroke();
    ctx.beginPath();ctx.moveTo(o.x+2,la);ctx.lineTo(o.x+2,la-o.h*.2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(o.x+2,la-o.h*.2);ctx.lineTo(o.x+5,la-o.h*.2);ctx.stroke();
    const ra=o.y+o.h*.48;
    ctx.beginPath();ctx.moveTo(mx+4,ra);ctx.lineTo(o.x+o.w-2,ra);ctx.stroke();
    ctx.beginPath();ctx.moveTo(o.x+o.w-2,ra);ctx.lineTo(o.x+o.w-2,ra-o.h*.2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(o.x+o.w-5,ra-o.h*.2);ctx.lineTo(o.x+o.w-2,ra-o.h*.2);ctx.stroke();
    ctx.restore();
  }
}

// ─── 角色绘制 ────────────────────────────────────
function drawDino(){
  const bx=D.x,by=D._y;
  ctx.save();
  if(!D.duck){
    const legY=by-LH;
    if(D.ground){
      const p=Math.sin(D.lp)*4;
      sLine(bx+9,legY,bx+9,by+p,2);sLine(bx+22,legY,bx+22,by-p,2);
      sLine(bx+5,by+p,bx+15,by+p,2);sLine(bx+18,by-p,bx+28,by-p,2);
    }else{
      sLine(bx+9,legY,bx+5,by,2);sLine(bx+22,legY,bx+27,by,2);
    }
    const bodyY=by-LH-BH+4;
    ctx.fillStyle='#fff';ctx.fillRect(bx+1,bodyY+1,BW-2,BH-2);
    sRect(bx,bodyY,BW,BH,2);
    ctx.strokeStyle='#222';ctx.lineWidth=1.8;
    ctx.beginPath();ctx.moveTo(bx+2,bodyY+BH-5);
    ctx.quadraticCurveTo(bx-16,bodyY+BH+3,bx-10,bodyY+BH-16);
    ctx.quadraticCurveTo(bx-1,bodyY+BH-22,bx+4,bodyY+BH-14);
    ctx.closePath();ctx.stroke();
    sLine(bx+BW,bodyY+12,bx+BW+7,bodyY+16,1.8);
    ctx.fillStyle='#fff';ctx.fillRect(bx+11,bodyY-NK,12,NK+5);
    sRect(bx+10,bodyY-NK,14,NK+6,1.7);
    const py=bodyY-NK-PH+5,px=bx+(BW-PW)/2;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.roundRect(px-2,py-2,PW+4,PH+4,6);ctx.fill();
    ctx.save();ctx.beginPath();ctx.roundRect(px,py,PW,PH,5);ctx.clip();
    if(PHOTO.complete&&PHOTO.naturalWidth>0) ctx.drawImage(PHOTO,px,py,PW,PH);
    ctx.restore();
    sRect(px,py,PW,PH,2);
  }else{
    const dlegY=by-LH;
    sLine(bx+10,dlegY,bx+6,by,2);sLine(bx+4,by,bx+16,by,2);
    sLine(bx+26,dlegY,bx+30,by,2);sLine(bx+24,by,bx+36,by,2);
    const dbY=dlegY-DBH+3;
    ctx.fillStyle='#fff';ctx.fillRect(bx+1,dbY+1,DBW-2,DBH-2);
    sRect(bx,dbY,DBW,DBH,2);
    ctx.strokeStyle='#222';ctx.lineWidth=1.8;
    ctx.beginPath();ctx.moveTo(bx+1,dbY+DBH-3);
    ctx.quadraticCurveTo(bx-14,dbY+DBH+2,bx-8,dbY+DBH-12);
    ctx.quadraticCurveTo(bx-1,dbY+DBH-16,bx+3,dbY+DBH-9);
    ctx.closePath();ctx.stroke();
    sLine(bx+DBW-2,dbY+8,bx+DBW+5,dbY+10,1.8);
    sRect(bx+DBW-14,dbY-6,12,8,1.6);
    const fpx=bx+DBW-16,fpy=dbY-DPH+4;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.roundRect(fpx-2,fpy-2,DPW+4,DPH+4,6);ctx.fill();
    ctx.save();ctx.beginPath();ctx.roundRect(fpx,fpy,DPW,DPH,5);ctx.clip();
    if(PHOTO.complete&&PHOTO.naturalWidth>0) ctx.drawImage(PHOTO,fpx,fpy,DPW,DPH);
    ctx.restore();
    sRect(fpx,fpy,DPW,DPH,2);
  }
  ctx.restore();
}

// ─── 生成障碍物 ──────────────────────────────────
function spawnObs(){
  const cfg = DIFF_LEVELS[diffLv];
  const r = Math.random();
  // 空中障碍物（飞石，需要蹲下通过）
  if(r < cfg.airChance){
    const h=20+Math.random()*14, w=22+Math.random()*14;
    // 飞石高度：正好让蹲下能过，站立会碰
    const airY = GY - LH - BH - 8 - Math.random()*12;
    obs.push({x:W+14, y:airY, w, h, air:true});
    return;
  }
  // 多联仙人掌
  let count = 1;
  if(r < cfg.airChance + cfg.tripleChance) count = 3;
  else if(r < cfg.airChance + cfg.tripleChance + cfg.doubleChance) count = 2;
  const h=22+Math.random()*22, w=12+Math.random()*10;
  for(let i=0;i<count;i++)
    obs.push({x:W+12+i*(w+8), y:GY-h+5, w, h, air:false});
}

// ─── 碰撞检测 ────────────────────────────────────
function hit(o){
  let hx,ht,hw,hh;
  if(!D.duck){hx=D.x+7;ht=D._y-LH-BH+10;hw=BW-12;hh=BH+LH-10;}
  else{hx=D.x+5;ht=D._y-LH-DBH+6;hw=DBW-8;hh=DBH+LH-6;}
  return hx<o.x+o.w-3&&hx+hw>o.x+3&&ht<o.y+o.h&&ht+hh>o.y;
}

// ─── 难度升级提示 ────────────────────────────────
let prevDiffLv = 0;
function checkDiffLevelUp(){
  const newLv = getDiffLevel(Math.floor(sc/10));
  if(newLv > diffLv){
    diffLv = newLv;
    const cfg = DIFF_LEVELS[diffLv];
    curGravity = cfg.gravity;
    curJumpV = cfg.jumpV;
    flashFrames = 28;
    flashColor = cfg.color;
    updateDiffUI(diffLv);
  }
}

// ─── 主更新 ──────────────────────────────────────
function update(){
  fr++;sc++;
  // 速度随分数平滑增加（基础值+微增量）
  const baseLvSpd = DIFF_LEVELS[diffLv].spdBase;
  const micro = Math.floor(sc/200)*0.06;
  spd = baseLvSpd + micro;

  checkDiffLevelUp();

  if(!D.ground){D.vy+=curGravity;D._y+=D.vy;}
  if(D._y>=GY){D._y=GY;D.vy=0;D.ground=true;}
  if(D.ground&&!D.duck) D.lp+=.22;
  clouds.forEach(c=>{c.x-=spd*.13;if(c.x<-60)c.x=W+60;});
  pebbles.forEach(p=>{p.x-=spd*.2;if(p.x<0)p.x=W+4;});

  const cfg = DIFF_LEVELS[diffLv];
  if(fr>=nxt){spawnObs();nxt=fr+cfg.obsMin+Math.floor(Math.random()*cfg.obsRand);}
  obs.forEach(o=>o.x-=spd);obs=obs.filter(o=>o.x>-60);

  if(flashFrames>0) flashFrames--;

  for(let o of obs){
    if(hit(o)){
      st='dead';
      if(sc>bst){bst=sc;document.getElementById('bst').textContent=Math.floor(bst/10);}
      draw();
      showDeathModal();
      return;
    }
  }
}

// ─── 绘制 ───────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

  // 升级闪光效果
  if(flashFrames>0&&st==='playing'){
    ctx.save();
    ctx.globalAlpha=flashFrames/28*0.13;
    ctx.fillStyle=flashColor;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
    // 顶部彩条
    ctx.save();
    ctx.globalAlpha=flashFrames/28*0.7;
    ctx.fillStyle=flashColor;
    ctx.fillRect(0,0,W,4);
    ctx.restore();
  }

  ctx.fillStyle='#333';ctx.font='bold 15px Caveat,cursive';
  ctx.fillText('得分: '+Math.floor(sc/10),10,20);
  ctx.fillText('速度: '+spd.toFixed(1),10,40);

  // 难度标签叠加
  const lbl = DIFF_LEVELS[diffLv].name;
  ctx.save();
  ctx.font='bold 13px Caveat,cursive';
  ctx.fillStyle=DIFF_LEVELS[diffLv].color;
  ctx.textAlign='right';
  ctx.fillText('【'+lbl+'】',W-8,20);
  ctx.restore();

  clouds.forEach(c=>drawCloud(c.x,c.y,c.s));
  drawGround();
  obs.forEach(drawObs);
  drawDino();
}

function loop(){if(st==='playing'){update();draw();raf=requestAnimationFrame(loop);}}

function startGame(keepScore){
  st='playing';
  if(!keepScore) sc=0;
  fr=0;spd=1.2;obs=[];nxt=90;
  diffLv=0;curGravity=.50;curJumpV=-13.5;flashFrames=0;
  D._y=GY;D.vy=0;D.ground=true;D.lp=0;D.duck=false;
  document.getElementById('msg').textContent='';
  updateDiffUI(0);
  cancelAnimationFrame(raf);loop();
}

// ─── 死亡弹窗 ────────────────────────────────────
function showDeathModal(){
  document.getElementById('death-score-num').textContent = Math.floor(sc/10);
  // 重置状态
  kissRefused = false;
  document.getElementById('no-kiss-btn').style.display='';
  document.getElementById('death-sub').textContent='给作者一个亲亲即可复活';
  document.getElementById('death-modal').style.display='flex';
}

function kissRevive(){
  document.getElementById('death-emoji').textContent='💋';
  document.getElementById('death-title').textContent='么么哒！';
  document.getElementById('death-sub').textContent = kissRefused ? '分数已保存，继续加油！💪' : '复活啦～';
  document.getElementById('death-btn-row').style.display='none';
  setTimeout(()=>{
    document.getElementById('death-modal').style.display='none';
    // 复原弹窗内容供下次使用
    document.getElementById('death-btn-row').style.display='flex';
    document.getElementById('death-emoji').textContent='💀';
    document.getElementById('death-title').textContent='你已死亡';
    startGame(kissRefused);
  }, 1000);
}

function kissRefuse(){
  const panel = document.getElementById('death-panel');
  panel.style.animation='shake .4s ease';
  setTimeout(()=>{ panel.style.animation='popIn .01s'; },400);
  // 隐藏"不亲亲"按钮，副标题变成提示
  document.getElementById('no-kiss-btn').style.display='none';
  document.getElementById('death-sub').textContent='亲一个就能保存分数继续游戏哦 😏';
  kissRefused = true;
}

let kissRefused = false;

// ─── 操作绑定 ────────────────────────────────────
function onJump(e){if(e)e.preventDefault();
  if(st==='idle'||st==='dead'){
    if(document.getElementById('death-modal').style.display==='flex') return;
    startGame();
  } else if(D.ground&&!D.duck){D.vy=curJumpV;D.ground=false;}
}
function onDuckStart(e){if(e)e.preventDefault();
  if(st==='idle'||st==='dead'){
    if(document.getElementById('death-modal').style.display==='flex') return;
    startGame();return;
  }
  D.duck=true;
}
function onDuckEnd(e){if(e)e.preventDefault();D.duck=false;}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();onJump();}
  if(e.code==='ArrowDown'){e.preventDefault();D.duck=true;}
  if(e.code==='Escape'){
    document.getElementById('death-modal').style.display='none';
  }
});
document.addEventListener('keyup',e=>{if(e.code==='ArrowDown')D.duck=false;});
cv.addEventListener('click',e=>{onJump();});
document.getElementById('bj').addEventListener('mousedown',onJump);
document.getElementById('bd').addEventListener('mousedown',onDuckStart);
document.getElementById('bd').addEventListener('mouseup',onDuckEnd);


// ─── 角色选择 ────────────────────────────────────
let charSelected = false;

// 把照片 src 注入预览图（PHOTO 已经加载）
window.addEventListener('load', ()=>{
  document.getElementById('char-preview').src = PHOTO.src;
});
// 如果 PHOTO 已经加载完直接设
if(PHOTO.complete && PHOTO.naturalWidth > 0){
  document.getElementById('char-preview').src = PHOTO.src;
}

function selectChar(){
  charSelected = true;
  document.getElementById('the-char-card').classList.add('selected');
  const btn = document.getElementById('char-start-btn');
  btn.classList.add('ready');
  document.getElementById('char-hint-txt').textContent = '准备好了！点击开始游戏 🎮';
}

function confirmChar(){
  if(!charSelected) return;
  document.getElementById('char-select').style.display = 'none';
  draw();
}

// 初始化
updateDiffUI(0);
draw();
setInterval(()=>{if(st==='playing')document.getElementById('sc').textContent=Math.floor(sc/10);},80);
</script>
